name: Database Connection
on:
  pull_request:
    branches: [main]
  push:
    branches: [production]
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  check-ec2-connection:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install SSM plugin
        run: |
          curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
          sudo dpkg -i session-manager-plugin.deb

      - name: Ping EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_FRONT_END_HOST }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["echo ok"]}' \
            --output text
          echo "EC2 is reachable"

  integration:
    runs-on: ubuntu-latest
    needs: check-ec2-connection
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install SSM plugin
        run: |
          curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
          sudo dpkg -i session-manager-plugin.deb

      - name: Open SSM tunnel to RDS via EC2
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          DB_HOST: ${{ secrets.DB_HOST }}
        run: |
          aws ssm start-session \
            --target "$EC2_INSTANCE_ID" \
            --document-name AWS-StartPortForwardingSessionToRemoteHost \
            --parameters "{\"host\":[\"$DB_HOST\"],\"portNumber\":[\"3306\"],\"localPortNumber\":[\"13306\"]}" &
          sleep 10

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pymysql

      - name: Test MySQL connectivity
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 13306
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          python - <<'EOF'
          import pymysql, os, sys
          try:
              conn = pymysql.connect(
                  host=os.environ["DB_HOST"],
                  port=int(os.environ["DB_PORT"]),
                  user=os.environ["DB_USER"],
                  password=os.environ["DB_PASSWORD"],
                  database=os.environ["DB_NAME"],
              )
              conn.cursor().execute("SELECT VERSION();")
              conn.close()
          except Exception as e:
              print(f"Connection failed: {e}")
              sys.exit(1)
          EOF