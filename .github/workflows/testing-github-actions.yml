name: Integration Tests

on:
  push:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install SSM Session Manager plugin
        run: |
          curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
          sudo dpkg -i session-manager-plugin.deb

      - - name: Open SSM tunnel to RDS via EC2
        run: |
          aws ssm start-session \
            --target ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name AWS-StartPortForwardingSessionToRemoteHost \
            --parameters '{
              "host": ["${{ secrets.DB_HOST }}"],
              "portNumber": ["3306"],
              "localPortNumber": ["13306"]
            }' &
          TUNNEL_PID=$!
          echo "Tunnel process PID: $TUNNEL_PID"
          echo "Waiting for tunnel to establish..."
          for i in $(seq 1 20); do
            echo "Attempt $i: checking port 13306..."
            if bash -c 'echo > /dev/tcp/127.0.0.1/13306' 2>/dev/null; then
              echo " Tunnel is up on attempt $i!"
              break
            fi
            if [ $i -eq 20 ]; then
              echo " Tunnel failed to establish after 40 seconds"
              echo "SSM process status:"
              ps -p $TUNNEL_PID || echo "Process no longer running"
              exit 1
            fi
            sleep 2
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pymysql

      - name: Test MySQL connectivity via SSM tunnel (Python)
        env:
          DB_HOST: ${{ secrets.DB_HOST}}
          DB_PORT: ${{secrets.DB_PORT}}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          python - <<'EOF'
          import pymysql
          import os
          import sys

          try:
              conn = pymysql.connect(
                  host=os.environ["DB_HOST"],
                  port=int(os.environ["DB_PORT"]),
                  user=os.environ["DB_USER"],
                  password=os.environ["DB_PASSWORD"],
                  database=os.environ["DB_NAME"],
              )
              print("Connected to RDS via SSM tunnel successfully!")
              cursor = conn.cursor()
              cursor.execute("SELECT VERSION();")
              version = cursor.fetchone()
              print(f"   MySQL version: {version[0]}")
              conn.close()
          except Exception as e:
              print(f"Connection failed: {e}")
              sys.exit(1)
          EOF