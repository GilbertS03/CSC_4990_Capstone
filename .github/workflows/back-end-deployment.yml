name: Back-end Deployment
on:
  push:
    branches: [production]
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ECR_BACK_REGISTRY: ${{secrets.ECR_BACK_REGISTRY}}
      ECR_BACK_REPOSITORY: ${{secrets.ECR_BACK_REPOSITORY}}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            app-backend
            docker-files/back
          sparse-checkout-cone-mode: true
 
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
 
      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin $ECR_BACK_REGISTRY
 
      - name: Build Docker image
        run: |
          docker build \
            -f docker-files/back/backend.Dockerfile \
            -t $ECR_BACK_REGISTRY/$ECR_BACK_REPOSITORY:$IMAGE_TAG \
            -t $ECR_BACK_REGISTRY/$ECR_BACK_REPOSITORY:latest \
            app-backend/
 
      - name: Push image to ECR
        run: |
          docker push $ECR_BACK_REGISTRY/$ECR_BACK_REPOSITORY:$IMAGE_TAG
          docker push $ECR_BACK_REGISTRY/$ECR_BACK_REPOSITORY:latest
 
      - name: Deploy to EC2 via SSM
        env:
          EC2_INSTANCE_ID: ${{ secrets.BACK_EC2_INSTANCE_ID }}
        run: |
          CMD_ID=$(aws ssm send-command \
          --instance-ids "$EC2_INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --query "Command.CommandId" \
          --output text \
          --parameters "{\"commands\":[
          \"aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $ECR_BACK_REGISTRY\",
          \"IMAGE_TAG=$IMAGE_TAG docker compose -f /home/ubuntu/myapp/docker-compose.yml pull backend\",
          \"IMAGE_TAG=$IMAGE_TAG docker compose -f /home/ubuntu/myapp/docker-compose.yml down backend\"
          \"IMAGE_TAG=$IMAGE_TAG docker compose -f /home/ubuntu/myapp/docker-compose.yml up -d backend\"
          ]}") 

          echo "Waiting for Command ID: $CMD_ID"

          aws ssm wait command-executed \
          --command-id "$CMD_ID" \
          --instance-id "$EC2_INSTANCE_ID"

          aws ssm get-command-invocation \
          --command-id "$CMD_ID" \
          --instance-id "$EC2_INSTANCE_ID" \
          --query "{Status:Status, Output:StandardOutputContent, Error:StandardErrorContent}" \
          --output table