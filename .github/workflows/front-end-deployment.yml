name: Front-end Deployment S3 and Cloudfront
on:
  push:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            app-frontend
          sparse-checkout-cone-mode: true

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-frontend/package-lock.json

      - name: Install dependencies
        working-directory: app-frontend
        run: npm ci

      - name: Build
        working-directory: app-frontend
        env:
          VITE_ENV: production
        run: npm run build

      - name: Sync to S3
        env:
            FRONTEND_S3_BUCKET: ${{secrets.FRONTEND_S3_BUCKET}}
            CLOUDFRONT_DISTRIBUTION_ID: ${{secrets.CLOUDFRONT_DISTRIBUTION_ID}}

        run: |
          aws s3 sync app-frontend/dist/ s3://$FRONTEND _S3_BUCKET/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          aws s3 cp app-frontend/dist/index.html s3://$FRONTEND_S3_BUCKET/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text)

          echo "Waiting for invalidation: $INVALIDATION_ID"
          aws cloudfront wait invalidation-completed \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --id "$INVALIDATION_ID"

          echo "Invalidation complete: $INVALIDATION_ID"