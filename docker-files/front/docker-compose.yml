  frontend:
    image: 943881661618.dkr.ecr.us-east-1.amazonaws.com/frontend/v1:${IMAGE_TAG}
    container_name: myapp-frontend
    restart: always
    ports: []
    expose:
     - "80"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: myapp-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      backend:
        condition: service_healthy